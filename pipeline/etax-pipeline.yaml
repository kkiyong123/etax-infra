apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: etax-build-deploy
  namespace: etax-app
spec:
  params:
  - name: SERVICE_NAME
    type: string
    description: Service name to build and deploy
  - name: GIT_URL
    type: string
    description: GitHub repository URL
  - name: GIT_REVISION
    type: string
    default: main
  tasks:
  - name: git-clone
    taskRef:
      name: git-clone
      kind: ClusterTask
    params:
    - name: url
      value: $(params.GIT_URL)
    - name: revision
      value: $(params.GIT_REVISION)
    workspaces:
    - name: output
      workspace: source
  - name: build-image
    taskRef:
      name: buildah
      kind: ClusterTask
    runAfter:
    - git-clone
    params:
    - name: IMAGE
      value: image-registry.openshift-image-registry.svc:5000/etax-app/$(params.SERVICE_NAME):latest
    - name: DOCKERFILE
      value: ./Dockerfile
    workspaces:
    - name: source
      workspace: source
  - name: deploy
    taskRef:
      name: openshift-client
      kind: ClusterTask
    runAfter:
    - build-image
    params:
    - name: SCRIPT
      value: |
        oc rollout restart deployment/$(params.SERVICE_NAME) -n etax-app
        oc rollout status deployment/$(params.SERVICE_NAME) -n etax-app
  workspaces:
  - name: source
